server {
    listen 80;
    server_name _;

    # 静态前端文件
    root /app/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 请求转发给 Flask（gunicorn）
    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    location /health {
        proxy_pass http://127.0.0.1:5001;
    }
}
