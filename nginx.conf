server {
    listen 80;
    server_name bubble-anotate.superfive.org;

    # Trust Cloudflare's forwarded IP headers
    real_ip_header   CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    # Static frontend files
    root  /var/www/bubble;
    index index.html;

    # Serve static assets directly; return 404 if missing (do not fall back to index.html)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache so browsers always fetch the latest hashed asset references
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests proxied to Flask (gunicorn)
    location /api/ {
        proxy_pass             http://127.0.0.1:5001;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     120s;
        client_max_body_size   50m;
    }

    location /health {
        proxy_pass http://127.0.0.1:5001;
    }
}
